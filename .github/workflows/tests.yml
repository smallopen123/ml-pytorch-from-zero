name: tests

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lightweight tutorial dependencies
        run: python -m pip install "numpy>=2.0,<3"
      - name: Run tutorial unit tests
        run: python -m unittest discover -s tests -v
